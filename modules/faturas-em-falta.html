<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faturas em Falta</title>
  <link rel="stylesheet" href="../css/styles.pcolor.css">
  <link rel="stylesheet" href="../css/mobile.css">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="manifest" href="../manifest.json">
</head>
<body data-page="faturas-em-falta">
  <button id="menu-icon" aria-label="Abrir menu">☰</button>

  <main>
    <section class="report-section">
      <div class="viz-card">
        <h2>Faturas em Falta</h2>

        <form id="missing-invoice-form" class="missing-invoice-form">
          <div class="form-group">
            <label for="missing-invoice-date">Data</label>
            <input type="date" id="missing-invoice-date" required>
          </div>

          <div class="form-group">
            <label for="missing-invoice-location">Local</label>
            <input type="text" id="missing-invoice-location" placeholder="Local" required>
          </div>

          <div class="form-group">
            <label for="missing-invoice-value">Valor</label>
            <input type="number" id="missing-invoice-value" placeholder="Valor (€)" min="0" step="0.01" required>
          </div>

          <button type="submit" class="primary">Adicionar</button>
        </form>

        <div class="table-wrap">
          <table id="missing-invoices-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Local</th>
                <th>Valor</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="missing-invoices-body">
              <tr><td colspan="4">A carregar...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="../js/faturas-em-falta.js"></script>
</body>
</html>
