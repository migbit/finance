<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Limpezas</title>
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="./icons/icon-192-v2.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #617184;
      --border: #d9e1ef;
      --accent: #30475f;
      --shadow: 0 22px 50px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: 'Montserrat', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(72, 99, 125, 0.14), transparent 32%),
        linear-gradient(180deg, #f8fafc 0%, #eef3f9 100%);
    }

    main {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 24px;
      border: 1px solid rgba(217, 225, 239, 0.95);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.55rem, 4vw, 2.1rem);
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .calendar-head button {
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .calendar-head button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .calendar-legend {
      display: flex;
      gap: 10px 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
    }

    .legend-dot.is-required { background: #d62828; }
    .legend-dot.is-optional { background: #20242c; }
    .legend-dot.is-123 { background: #1677d2; }
    .legend-dot.is-1248 { background: #ed7a16; }

    .calendar-meta {
      min-height: 20px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
    }

    .calendar-meta.is-error {
      color: #991b1b;
    }

    .calendar-weeks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .calendar-week {
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .calendar-week h2 {
      margin: 0 0 2px;
      color: var(--accent);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .calendar-day {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .calendar-day-date {
      margin-bottom: 9px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .calendar-day-statuses {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .apartment-status {
      min-height: 58px;
      padding: 8px 9px 8px 13px;
      border-left: 6px solid var(--apartment-color);
      border-radius: 10px;
      display: grid;
      align-content: center;
      gap: 2px;
    }

    .apartment-status span {
      font-size: 0.72rem;
      font-weight: 800;
    }

    .apartment-status strong {
      font-size: 0.92rem;
    }

    .apartment-status.is-123 { --apartment-color: #1677d2; }
    .apartment-status.is-1248 { --apartment-color: #ed7a16; }

    .apartment-status.is-required {
      background: #d62828;
      color: #fff;
    }

    .apartment-status.is-optional {
      background: #20242c;
      color: #fff;
    }

    .apartment-status.is-occupied {
      background: #edf1f5;
      color: #566477;
    }

    .apartment-status.is-free {
      background: #f8fafc;
      color: #566477;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 28px 12px;
      color: var(--muted);
      text-align: center;
      font-style: italic;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      main {
        padding: 17px;
      }

      .calendar-weeks {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="calendar-head">
      <div>
        <h1>Dias de Limpeza</h1>
        <p>Calendário atualizado dos próximos 14 dias.</p>
      </div>
      <button type="button" id="reload-cleaning-calendar">Atualizar</button>
    </header>

    <div class="calendar-legend" aria-label="Legenda">
      <span class="legend-item"><span class="legend-dot is-required"></span>Vermelho: limpar nesse dia</span>
      <span class="legend-item"><span class="legend-dot is-optional"></span>Preto: pode limpar nesse dia</span>
      <span class="legend-item"><span class="legend-dot is-123"></span>Apartamento 123</span>
      <span class="legend-item"><span class="legend-dot is-1248"></span>Apartamento 1248</span>
    </div>

    <div id="cleaning-calendar-meta" class="calendar-meta" role="status" aria-live="polite">
      A carregar calendário...
    </div>
    <div id="cleaning-calendar-weeks" class="calendar-weeks">
      <div class="empty-state">A carregar os dias de limpeza...</div>
    </div>
  </main>

  <script type="module" src="./js/cleaning-hours-public.js?v=20260630-3"></script>
</body>
</html>
